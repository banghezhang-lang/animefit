# AnimeFit Netlify 部署配置
[build]
  publish = "output"
  # 如果用 Netlify 后台构建（非 GitHub Actions），取消下面注释
  # command = "pip install -r requirements.txt && python daily_job.py --now"

[build.environment]
  PYTHON_VERSION = "3.11"
  NODE_VERSION = "20"

# 重定向规则：支持子目录路由
[[redirects]]
  from = "/zh/*"
  to = "/zh/:splat"
  status = 200

[[redirects]]
  from = "/en/*"
  to = "/en/:splat"
  status = 200

[[redirects]]
  from = "/ja/*"
  to = "/ja/:splat"
  status = 200

# 默认重定向
[[redirects]]
  from = "/"
  to = "/zh/index.html"
  status = 200

# 缓存控制
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
