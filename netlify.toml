# AnimeFit Netlify 部署配置
[build]
  # 使用 GitHub Actions 构建，这里只是占位
  # 实际构建在 .github/workflows/deploy-netlify.yml 中完成
  publish = "output"

[build.environment]
  NODE_VERSION = "20"

# 重定向规则：支持 SPA 路由
[[redirects]]
  from = "/en/*"
  to = "/en/:splat"
  status = 200

[[redirects]]
  from = "/ja/*"
  to = "/ja/:splat"
  status = 200

# 默认重定向到中文
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# 缓存控制
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
